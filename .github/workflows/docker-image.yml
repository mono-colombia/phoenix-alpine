name: Build & publish Docker image

on:
  push:
    branches: [master]

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  TAG: "1.19.5-sre"
  AWS_REGION: us-east-1
  GHCR_IMAGE: ghcr.io/mono-colombia/phoenix-alpine
  DOCKERHUB_IMAGE: monocolombia/phoenix-alpine
  ECR_PUBLIC_IMAGE: public.ecr.aws/monocolombia/phoenix-alpine

jobs:
  build:
    name: build_${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-latest,    platform: linux/amd64 }
          - { arch: arm64, runner: ubuntu-24.04-arm, platform: linux/arm64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (${{ matrix.platform }})
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          pull: true
          load: true
          tags: ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Verify Elixir
        run: docker run --rm ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ matrix.arch }} sh -c "elixir --version"

      - name: Push staging image to GHCR
        run: docker push ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ matrix.arch }}

  push-multi-arch:
    name: push-multi-arch
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_OIDC }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "github-actions-session"

      - name: Configure AWS Credentials (Mono Containers Custom)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_MONO_CONTAINERS_CUSTOM }}
          aws-region: ${{ env.AWS_REGION }}
          role-external-id: "mono-containers-custom"
          role-session-name: "github-actions-mono-containers-custom"
          role-skip-session-tagging: true
          role-chaining: true

      - name: Login to AWS ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Create multi-arch manifest on GHCR
        run: |
          docker buildx imagetools create \
            -t ${{ env.GHCR_IMAGE }}:${{ env.TAG }} \
            ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-amd64 \
            ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-arm64

      - name: Publish multi-arch image to Docker Hub & ECR Public
        run: |
          docker buildx imagetools create -t ${{ env.DOCKERHUB_IMAGE }}:${{ env.TAG }} ${{ env.GHCR_IMAGE }}:${{ env.TAG }}
          docker buildx imagetools create -t ${{ env.ECR_PUBLIC_IMAGE }}:${{ env.TAG }} ${{ env.GHCR_IMAGE }}:${{ env.TAG }}

      - name: Inspect manifests
        if: always()
        run: |
          for img in \
            ${{ env.GHCR_IMAGE }}:${{ env.TAG }} \
            ${{ env.DOCKERHUB_IMAGE }}:${{ env.TAG }} \
            ${{ env.ECR_PUBLIC_IMAGE }}:${{ env.TAG }}; do
            echo "---- $img ----"
            docker buildx imagetools inspect "$img" || true
          done
